<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sli4mePL's Portfolio</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333;
            font-family: Arial, sans-serif;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        .avatar {
            border-radius: 50%;
            width: 100px;
            height: 100px;
        }
        nav {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        nav button {
            background-color: #ccc;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            margin: 0 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        nav button:hover {
            background-color: #bbb;
        }
        .info-box {
            float: left;
            width: 25%;
            background-color: #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            margin-right: 20px;
        }
        .content {
            float: right;
            width: 70%;
            text-align: center;
        }
        .clear {
            clear: both;
        }
    </style>
</head>
<body>
    <header>
        <img src="placeholder-avatar.png" alt="Avatar" class="avatar">
        <h1>Hi Welcome to my website :)</h1>
    </header>
    <nav>
        <button>My Setup</button>
        <button>About Me</button>
        <button>Socials</button>
        <button>My Friends</button>
        <button>Games</button>
        <button>Updates</button>
        <button>Devs</button>
    </nav>
    <div class="info-box">
        <h3>Updates</h3>
        <p>Check the Updates!</p>
    </div>
    <div class="content">
        <h2>Welcome to Sli4mePL's Portfolio Page</h2>
        <p>Here you will find information about my projects, interests, and updates.</p>
    </div>
    <div class="clear"></div>
</body>
</html>
