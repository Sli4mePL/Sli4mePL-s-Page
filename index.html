<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Sections</title>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body>
    <button onclick="toggleSection('section1')">Show Section 1</button>
    <button onclick="toggleSection('section2')">Show Section 2</button>
    <button onclick="toggleSection('section3')">Show Section 3</button>

    <div id="section1" class="hidden">This is Section 1</div>
    <div id="section2" class="hidden">This is Section 2</div>
    <div id="section3" class="hidden">This is Section 3</div>

    <script>
        function toggleSection(sectionId) {
            const sections = document.querySelectorAll('div');
            sections.forEach(section => {
                section.classList.add('hidden');
            });
            document.getElementById(sectionId).classList.remove('hidden');
        }
    </script>
</body>
</html>
